name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: barterswap
          POSTGRES_PASSWORD: barterswap
          POSTGRES_DB: barterswap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U barterswap -d barterswap_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://barterswap:barterswap@localhost:5432/barterswap_test?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          unformatted=$(gofmt -l -s .)
          if [ -n "$unformatted" ]; then
            echo "Fichiers non formatés :"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test (avec PostgreSQL)
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: couverture >= 60%
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{gsub("%", "", $3); print $3}')
          echo "Couverture totale : ${total}%"
          awk -v t="$total" 'BEGIN { if (t < 60) { print "Échec : couverture sous le seuil de 60%"; exit 1 } }'
